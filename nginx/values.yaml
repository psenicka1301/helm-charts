## @param replicaCount Number of nginx replicas deployed
replicaCount: 3

## Settings for nginx image
##
## @param image.name Nginx image name to use
## @param image.tag Nginx image tag to use
image:
  name: nginx
  tag: '1.27.0'

## Nginx container ports
##
## @param containerPorts.http
containerPorts:
  http: 80

## Settings for nginx service
##
## @param service.senabled Whether to deploy
## @param service.type The type of service in front of nginx
## @param service.port The port where the service is receiving requests
service:
  enabled: true
  type: ClusterIP
  port: 80
